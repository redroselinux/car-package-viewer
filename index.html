<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Car Packages</title>
<style>
body {
  margin: 0;
  background-color: rgb(17, 17, 17);
  color: white;
  font-family: monospace;
  scroll-behavior: smooth;
}

#search {
  display: block;
  width: 100%;
  max-width: 600px;
  margin: 2em auto;
  padding: 0.5em 1em;
  background-color: rgb(24, 24, 24);
  border: 1px solid rgb(60, 60, 60);
  color: white;
  font-family: monospace;
}

.software-list {
  margin-top: 2em;
  display: flex;
  flex-direction: column;
  gap: 2em;
  width: 80%;
  max-width: 800px;
  text-align: left;
  margin-left: auto;
  margin-right: auto;
}

.package-item {
  padding: 1em;
  background-color: rgb(24, 24, 24);
  border: 1px solid rgb(60, 60, 60);
  transition: transform 0.2s, background 0.2s;
  cursor: pointer;
}

.package-item:hover {
  background-color: rgb(32, 32, 32);
}

.package-item h3 {
  margin: 0 0 0.3em 0;
  color: rgb(255, 60, 60);
}

.package-item .repo {
  font-size: 0.9em;
  color: rgb(200, 200, 200);
  margin-bottom: 0.5em;
}

.package-item pre {
  background-color: rgb(17, 17, 17);
  border: 1px solid rgb(60, 60, 60);
  padding: 0.5em;
  overflow-x: auto;
  font-family: monospace;
  margin-top: 0.5em;
}

.trusted {
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
  margin-left: 6px;
}

.trusted-true { background: #4CAF50; color: white; }
.trusted-maybe { background: #FF9800; color: white; }
.trusted-false { background: #F44336; color: white; }

.dep-tag {
  font-size: 10px;
  background: #FF9800;
  color: white;
  padding: 2px 4px;
  border-radius: 3px;
  margin-left: 4px;
  font-weight: bold;
}

.description {
  margin-top: 0.3em;
  color: rgb(200,200,200);
  font-size: 0.95em;
}

.outdated {
  font-size: 12px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 6px;
}

.outdated-true { background: #F44336; color: white; }
.outdated-false { background: #4CAF50; color: white; }
</style>
</head>
<body>

<input type="text" id="search" placeholder="Search packages..." />
<div class="software-list" id="packages"></div>

<script>
const repositories = [
  { owner: 'redroselinux', repo: 'car-binary-storage' },
  { owner: 'redroselinux', repo: 'car-coreutils-repo' }
];

const packagesDiv = document.getElementById('packages');
const searchInput = document.getElementById('search');

let allPackages = [];

async function fetchAllPackages() {
  allPackages = [];
  for (const repo of repositories) {
    const url = `https://api.github.com/repos/${repo.owner}/${repo.repo}/contents/`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      const dirs = data.filter(item => item.type === 'dir').map(d => ({...d, owner: repo.owner, repo: repo.repo}));
      allPackages = allPackages.concat(dirs);
    } catch (err) {
      console.error(`Failed to fetch packages from ${repo.owner}/${repo.repo}`);
    }
  }
  renderPackages(allPackages);
}

async function renderPackages(list) {
  packagesDiv.innerHTML = '';
  if (!list.length) { packagesDiv.innerHTML = '<p style="text-align:center;">No packages found.</p>'; return; }

  for (const pkg of list) {
    const item = document.createElement('div');
    item.className = 'package-item';
    const url = `https://raw.githubusercontent.com/${pkg.owner}/${pkg.repo}/main/${pkg.name}/install_script`;

    let scriptText = 'Install script not found.';
    let versionText = '';
    let trustedSpan = '';
    let depTag = '';
    let descriptionText = '';
    let outdatedSpan = '';

    try {
      const res = await fetch(url);
      if (res.ok) {
        scriptText = await res.text();

        // Version
        const versionMatch = scriptText.match(/version\s*=\s*"(.*)"/);
        versionText = versionMatch ? `Version: ${versionMatch[1]}` : '';

        // Trusted
        const trustedMatch = scriptText.match(/trusted\s*=\s*"(.*)"/);
        if (trustedMatch) {
          trustedSpan = `<span class="trusted trusted-${trustedMatch[1].toLowerCase()}">${trustedMatch[1]}</span>`;
        }

        // Pacman deps highlight as maybe
        const pacmanDepsMatch = scriptText.match(/pacman_deps\s*=\s*\[(.*?)\]/);
        if (pacmanDepsMatch) depTag = `<span class="dep-tag">uses pacman</span>`;

        // Description
        const descMatch = scriptText.match(/description\s*=\s*"(.*)"/);
        if (descMatch) descriptionText = descMatch[1];

        // Outdated
        const outdatedMatch = scriptText.match(/outdated\s*=\s*(True|False)/);
        if (outdatedMatch) {
          const val = outdatedMatch[1].toLowerCase();
          outdatedSpan = `<span class="outdated outdated-${val}">Outdated: ${val}</span>`;
        }
      }
    } catch {}

    item.innerHTML = `
      <div class="repo">${pkg.owner}/${pkg.repo}</div>
      <h3>${pkg.name} ${trustedSpan} ${outdatedSpan}</h3>
      <div class="description">${descriptionText}</div>
      ${depTag ? depTag : ''} ${versionText ? versionText : ''}
      <pre>${scriptText}</pre>
    `;
    packagesDiv.appendChild(item);
  }
}

// Search
searchInput.addEventListener('input', () => {
  const term = searchInput.value.toLowerCase();
  renderPackages(allPackages.filter(pkg => pkg.name.toLowerCase().includes(term)));
});

fetchAllPackages();
</script>

</body>
</html>
