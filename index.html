<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Car Package Viewer</title>
        <style>
            :root {
                --bg: #0e0e11;
                --fg: #eaeaf0;
                --muted: #b0b0c0;
                --accent: #ea645d;
                --card: #16161d;
                --border: #262636;
                --code-bg: #09090d;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: system-ui, sans-serif;
                background: var(--bg);
                color: var(--fg);
                line-height: 1.4;
            }

            header {
                padding: 1.5rem;
                border-bottom: 1px solid var(--border);
                text-align: left;
                max-width: 1200px;
                margin: 0 auto;
            }

            header h1 {
                font-size: 1.5rem;
                margin: 0;
                color: var(--accent);
            }
            #status {
                font-size: 0.8rem;
                color: var(--muted);
            }

            .controls {
                max-width: 1200px;
                margin: 1rem auto;
                padding: 0 1.5rem;
            }

            #search {
                width: 100%;
                background: var(--card);
                border: 1px solid var(--border);
                color: var(--fg);
                padding: 0.5rem 0.8rem;
                border-radius: 6px;
                outline: none;
                font-size: 0.9rem;
            }

            #package-list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 0.8rem;
                padding: 1rem 1.5rem;
                max-width: 1200px;
                margin: 0 auto;
            }

            .package-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 0.8rem;
                display: flex;
                flex-direction: column;
            }

            .pkg-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 0.2rem;
            }

            .pkg-title {
                font-size: 1rem;
                font-weight: 700;
                color: var(--accent);
                margin: 0;
            }
            .pkg-version {
                font-family: monospace;
                font-size: 0.7rem;
                color: var(--muted);
            }
            .pkg-license {
                font-size: 0.65rem;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 0.4rem;
            }
            .pkg-desc {
                font-size: 0.8rem;
                opacity: 0.8;
                margin: 0.3rem 0 0.8rem 0;
                min-height: 2.4em;
            }

            /* --- Install Command Block --- */
            .install-cmd {
                background: var(--code-bg);
                border: 1px solid var(--border);
                padding: 0.4rem 0.6rem;
                border-radius: 4px;
                font-family: monospace;
                font-size: 0.75rem;
                color: #fff;
                cursor: pointer;
                position: relative;
                margin-bottom: 0.5rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .install-cmd:hover {
                border-color: var(--accent);
            }
            .install-cmd::after {
                content: "click to copy";
                position: absolute;
                right: 5px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 0.6rem;
                color: var(--accent);
                opacity: 0;
                transition: opacity 0.2s;
            }
            .install-cmd:hover::after {
                opacity: 1;
            }

            .dl-link {
                font-size: 0.75rem;
                color: var(--muted);
                text-decoration: underline;
                align-self: flex-start;
            }
            .dl-link:hover {
                color: var(--accent);
            }

            .hidden {
                display: none;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Car Package Viewer</h1>
            <div id="status">Syncing packages...</div>
        </header>

        <div class="controls">
            <input
                type="text"
                id="search"
                placeholder="Filter..."
                oninput="filter()"
            />
        </div>

        <div id="package-list"></div>

        <script>
            const README_URL =
                "https://cdn.jsdelivr.net/gh/redroselinux/car3-pkgs@main/README";
            const list = document.getElementById("package-list");
            const status = document.getElementById("status");
            let allPkgs = [];

            async function streamData() {
                try {
                    const response = await fetch(README_URL);
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let remainder = "";
                    let current = {};

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;

                        const lines = (
                            remainder + decoder.decode(value, { stream: true })
                        ).split("\n");
                        remainder = lines.pop();

                        lines.forEach((line) => {
                            const t = line.trim();
                            if (!t) return;

                            if (t.includes(" - http")) {
                                const [name, url] = t.split(" - ");
                                current.name = name.trim();
                                current.url = url.trim();
                            } else if (t.startsWith("##")) {
                                current.license = t.replace("##", "").trim();
                            } else if (t.startsWith(">")) {
                                if (!current.name)
                                    current.name = t.replace(">", "").trim();
                                else
                                    current.description = t
                                        .replace(">", "")
                                        .trim();
                            } else if (t.startsWith("version")) {
                                current.version = t
                                    .replace("version", "")
                                    .trim();
                                render(current);
                                allPkgs.push({ ...current });
                                current = {};
                            }
                        });
                    }
                    status.innerText = `${allPkgs.length} packages found`;
                } catch (e) {
                    status.innerText = "Error syncing repo.";
                }
            }

            function copyToClipboard(text, el) {
                navigator.clipboard.writeText(text);
                const originalText = el.innerText;
                el.innerText = "COPIED!";
                setTimeout(() => {
                    el.innerText = originalText;
                }, 1000);
            }

            function render(pkg) {
                const div = document.createElement("div");
                div.className = "package-card";
                div.setAttribute("data-name", pkg.name.toLowerCase());

                const installStr = `sudo car install ${pkg.name}`;

                div.innerHTML = `
            <div class="pkg-header">
                <h2 class="pkg-title">${pkg.name}</h2>
                <span class="pkg-version">v${pkg.version}</span>
            </div>
            <div class="pkg-license">${pkg.license || "unknown"}</div>
            <p class="pkg-desc">${pkg.description || "A Car package."}</p>
            <div class="install-cmd" onclick="copyToClipboard('${installStr}', this)">
                ${installStr}
            </div>
            ${pkg.url ? `<a href="${pkg.url}" class="dl-link">Download Source</a>` : ""}
        `;
                list.appendChild(div);
            }

            function filter() {
                const q = document.getElementById("search").value.toLowerCase();
                document.querySelectorAll(".package-card").forEach((c) => {
                    c.classList.toggle(
                        "hidden",
                        !c.getAttribute("data-name").includes(q),
                    );
                });
            }

            streamData();
        </script>
    </body>
</html>
