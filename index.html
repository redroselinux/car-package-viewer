<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Packages</title>
<style>
  :root{--bg:#111;--card:#181818;--border:#444;--muted:#888;--accent:#ff3c3c}
  html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:monospace}
  #search{width:100%;max-width:620px;margin:2rem auto;display:block;padding:.5rem 1rem;background:var(--card);border:1px solid var(--border);color:#fff}
  .package-list{width:86%;max-width:920px;margin:0 auto;display:flex;flex-direction:column;gap:.6rem}
  .package-item{background:var(--card);border:1px solid var(--border);padding:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
  .package-item:hover{background:#242424}
  .pkg-name{font-weight:700}
  .muted{color:var(--muted)}
  .repo{font-size:.9rem;color:#bdbdbd;margin-left:1rem}
  .script{display:none;padding:.6rem;border-top:1px dashed var(--border);background:rgba(255,255,255,0.02);margin-top:.5rem}
  .script pre{margin:0;background:#0b0b0b;padding:.6rem;border:1px solid var(--border);overflow:auto}
  .meta{font-size:.85rem;color:#cfcfcf}
  .badge{font-size:.75rem;padding:2px 6px;border-radius:4px;margin-left:6px}
  .trusted-true{background:#4CAF50;color:#fff}
  .trusted-false{background:#777;color:#fff}
  .outdated-true{background:#F44336;color:#fff}
  .dep-tag{font-size:.72rem;background:#FF9800;color:#fff;padding:2px 6px;border-radius:4px;margin-left:6px}
  .center{text-align:center;color:#bbb;padding:2rem}
</style>
</head>
<body>

<input id="search" placeholder="Search packages... (only package names shown)" />
<div class="package-list" id="list"></div>

<script>
// Repositories to scan
const REPOS = [
  { owner: 'redroselinux', repo: 'car-binary-storage' },
  { owner: 'redroselinux', repo: 'car-coreutils-repo' }
];

const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');
let allPackages = [];

async function fetchDirsFromRepo(owner, repo) {
  const url = `https://api.github.com/repos/${owner}/${repo}/contents/`;
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    const data = await r.json();
    return data.filter(i => i.type === 'dir').map(d => ({ ...d, owner, repo }));
  } catch (e) {
    console.error('fetch error', e);
    return [];
  }
}

async function fetchInstallScript(pkg) {
  const url = `https://raw.githubusercontent.com/${pkg.owner}/${pkg.repo}/main/${pkg.name}/install_script`;
  try {
    const r = await fetch(url);
    if (!r.ok) return '';
    return await r.text();
  } catch {
    return '';
  }
}

function parseMeta(scriptText) {
  const meta = { raw: scriptText, version: '', trusted: 'true', pacmanDeps: false, description: '', outdated: false };
  if (!scriptText) return meta;
  const v = scriptText.match(/version\s*=\s*"([^"]+)"/i);
  if (v) meta.version = v[1];
  const t = scriptText.match(/trusted\s*=\s*"([^"]+)"/i);
  if (t) meta.trusted = t[1].toLowerCase();
  const p = scriptText.match(/pacman_deps\s*=\s*\[(.*?)\]/is);
  if (p) meta.pacmanDeps = true;
  const d = scriptText.match(/description\s*=\s*"([^"]+)"/i);
  if (d) meta.description = d[1];
  const o = scriptText.match(/outdated\s*=\s*(True|False)/i);
  if (o) meta.outdated = o[1].toLowerCase() === 'true';
  return meta;
}

function escapeHtml(s){
  return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

async function loadAll() {
  allPackages = [];
  for (const r of REPOS) {
    const dirs = await fetchDirsFromRepo(r.owner, r.repo);
    allPackages.push(...dirs);
  }
  // render visible list (name + repo only)
  render(allPackages);
}

async function render(pkgs) {
  listEl.innerHTML = '';
  if (!pkgs.length) { listEl.innerHTML = '<div class="center">No packages found.</div>'; return; }

  for (const pkg of pkgs) {
    const item = document.createElement('div');
    item.className = 'package-item';

    // Name + repo shown initially
    const left = document.createElement('div');
    left.style.display = 'flex';
    left.style.alignItems = 'center';

    const nameEl = document.createElement('div');
    nameEl.className = 'pkg-name';
    nameEl.textContent = pkg.name;

    const repoEl = document.createElement('div');
    repoEl.className = 'repo';
    repoEl.textContent = `${pkg.owner}/${pkg.repo}`;

    left.appendChild(nameEl);
    left.appendChild(repoEl);

    const right = document.createElement('div');
    right.className = 'meta';
    right.textContent = '';

    item.appendChild(left);
    item.appendChild(right);

    // hidden script & metadata area
    const details = document.createElement('div');
    details.className = 'script';

    item.appendChild(details);

    // On first click we fetch metadata + script and expand
    let expanded = false;
    let cachedMeta = null;

    item.addEventListener('click', async (e) => {
      // prevent click when clicking links inside details later
      if (!expanded) {
        // fetch script and parse metadata
        const raw = await fetchInstallScript(pkg);
        const meta = parseMeta(raw);
        cachedMeta = meta;

        // Apply muted style if outdated OR trusted explicitly false
        if (meta.outdated || meta.trusted === 'false') {
          nameEl.classList.add('muted');
        }

        // Build details view
        const infoLine = document.createElement('div');
        infoLine.className = 'meta';

        const version = meta.version ? `Version: ${meta.version}` : '';
        infoLine.textContent = version;

        // trusted badge
        const tBadge = document.createElement('span');
        tBadge.className = `badge ${meta.trusted === 'false' ? 'trusted-false' : 'trusted-true'}`;
        tBadge.textContent = `trusted: ${meta.trusted}`;
        infoLine.appendChild(tBadge);

        // outdated badge
        const oBadge = document.createElement('span');
        oBadge.className = `badge ${meta.outdated ? 'outdated-true' : ''}`;
        if (meta.outdated) { oBadge.textContent = 'outdated: true'; infoLine.appendChild(oBadge); }

        // dep tag
        if (meta.pacmanDeps) {
          const dTag = document.createElement('span');
          dTag.className = 'dep-tag';
          dTag.textContent = 'uses pacman';
          infoLine.appendChild(dTag);
        }

        // description
        if (meta.description) {
          const desc = document.createElement('div');
          desc.className = 'meta';
          desc.textContent = meta.description;
          details.appendChild(desc);
        }

        details.appendChild(infoLine);

        // script block
        const pre = document.createElement('pre');
        pre.innerHTML = escapeHtml(meta.raw || 'Install script not found.');
        details.appendChild(pre);

        details.style.display = 'block';
        expanded = true;
      } else {
        // toggle visibility
        details.style.display = details.style.display === 'none' ? 'block' : 'none';
      }
    });

    listEl.appendChild(item);
  }
}

// simple search by package name
searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  if (!q) return render(allPackages);
  render(allPackages.filter(p => p.name.toLowerCase().includes(q)));
});

loadAll();
</script>

</body>
</html>
